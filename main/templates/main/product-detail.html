{% extends "main/base.html" %} {% block title %}{{ product.name }} | Zee
Afrika{% endblock %} {% block content %}
<div class="container py-5">
  <div class="row">
    <div class="col-md-6">
      <img src="{{ product.get_main_image_url }}" class="img-fluid rounded" />
    </div>

    <div class="col-md-6">
      <h2>{{ product.name }}</h2>
      <h4 class="text-success">${{ product.price }}</h4>
      <p class="mt-3">{{ product.description }}</p>

      <form method="post" action="{% url 'add_to_cart' product.id %}">
        {% csrf_token %}
        <div class="d-flex mb-3">
          <input
            type="number"
            name="quantity"
            value="1"
            min="1"
            class="form-control me-2"
            style="width: 100px"
          />
          <button class="btn btn-success">Add to Cart</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
