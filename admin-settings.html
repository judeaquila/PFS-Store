<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Settings</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/admin.css" />
    <!-- optional external css -->
  </head>
  <body>
    <!-- SIDEBAR (Products active) -->
    <div class="collapse d-lg-block sidebar" id="sidebarMenu">
      <h4 class="text-center d-none d-lg-block">GreenBasket Admin</h4>
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="admin-products.html">Products</a>
      <a href="admin-orders.html">Orders</a>
      <a href="admin-users.html">Users</a>
      <a href="admin-transactions.html">Transactions</a>
      <a href="admin-settings.html" class="active">Settings</a>
    </div>

    <div class="main-content">
      <nav class="navbar bg-white shadow-sm rounded mb-4 px-3">
        <span class="navbar-brand fw-semibold">Settings</span>
      </nav>

      <div class="bg-white p-4 rounded shadow-sm">
        <form>
          <div class="mb-3">
            <label class="form-label">Store Name</label>
            <input type="text" class="form-control" value="GreenBasket" />
          </div>

          <div class="mb-3">
            <label class="form-label">Support Email</label>
            <input
              type="email"
              class="form-control"
              value="support@greenbasket.com"
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Currency</label>
            <select class="form-select">
              <option selected>USD ($)</option>
              <option>EUR (€)</option>
            </select>
          </div>

          <button class="btn btn-success">Save Changes</button>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
