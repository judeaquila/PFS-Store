<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Products</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/admin.css" />
    <!-- optional external css -->
  </head>
  <body>
    <!-- SIDEBAR (Products active) -->
    <div class="collapse d-lg-block sidebar" id="sidebarMenu">
      <h4 class="text-center d-none d-lg-block">GreenBasket Admin</h4>
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="admin-products.html" class="active">Products</a>
      <a href="admin-orders.html">Orders</a>
      <a href="admin-users.html">Users</a>
      <a href="admin-transactions.html">Transactions</a>
      <a href="admin-settings.html">Settings</a>
    </div>

    <div class="main-content">
      <nav class="navbar bg-white shadow-sm rounded mb-4 px-3">
        <span class="navbar-brand fw-semibold">Products Management</span>
        <button
          class="btn btn-success btn-sm"
          data-bs-toggle="modal"
          data-bs-target="#addProductModal"
        >
          + Add Product
        </button>
      </nav>

      <div class="bg-white p-4 rounded shadow-sm">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead class="table-light">
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>
                  <img src="https://via.placeholder.com/60" class="rounded" />
                </td>
                <td>Organic Almonds</td>
                <td>$12.99</td>
                <td>120</td>
                <td>
                  <button
                    class="btn btn-sm btn-outline-primary edit-btn"
                    data-id="1"
                    data-name="Organic Almonds"
                    data-price="12.99"
                    data-stock="120"
                    data-bs-toggle="modal"
                    data-bs-target="#editProductModal"
                  >
                    Edit
                  </button>
                  <button class="btn btn-sm btn-outline-danger">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Add Product Modal -->
    <div class="modal fade" id="addProductModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Add New Product</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <form id="addProductForm">
              <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" class="form-control" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Price ($)</label>
                <input type="number" class="form-control" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Stock</label>
                <input type="number" class="form-control" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Image URL</label>
                <input type="text" class="form-control" />
              </div>

              <button type="submit" class="btn btn-success w-100">
                Add Product
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit Product Modal -->
    <div class="modal fade" id="editProductModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Product</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <form id="editProductForm">
              <input type="hidden" id="editId" />

              <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input
                  type="text"
                  id="editName"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Price ($)</label>
                <input
                  type="number"
                  id="editPrice"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Stock</label>
                <input
                  type="number"
                  id="editStock"
                  class="form-control"
                  required
                />
              </div>

              <button type="submit" class="btn btn-success w-100">
                Save Changes
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
