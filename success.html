<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Order Successful - GreenBasket</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />

    <style>
      .success-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        animation: fadeIn 0.8s ease;
      }

      .success-card {
        padding: 60px 40px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
        background: #ffffff;
        max-width: 500px;
        width: 100%;
      }

      /* Animated Checkmark */
      .checkmark-circle {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: #2f9e44;
        margin: 0 auto 30px;
        position: relative;
        animation: pop 0.5s ease;
      }

      .checkmark {
        position: absolute;
        top: 35px;
        left: 32px;
        width: 50px;
        height: 25px;
        border-left: 6px solid white;
        border-bottom: 6px solid white;
        transform: rotate(-45deg);
        animation: draw 0.6s ease forwards;
      }

      @keyframes pop {
        0% {
          transform: scale(0);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes draw {
        0% {
          width: 0;
          height: 0;
        }
        100% {
          width: 50px;
          height: 25px;
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .countdown {
        font-size: 14px;
        color: #6c757d;
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg px-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">GreenBasket</a>
      </div>
    </nav>

    <div class="container success-container">
      <div class="success-card">
        <div class="checkmark-circle">
          <div class="checkmark"></div>
        </div>

        <h2 class="mb-3 text-success">Payment Successful!</h2>
        <p class="mb-3">
          Thank you for your purchase. Your healthy goodies are on their way! 🌿
        </p>

        <h4 class="mb-3">Total Paid: $<span id="success-total">0</span></h4>

        <a href="products.html" class="btn btn-green mt-3">
          Continue Shopping
        </a>

        <p class="countdown mt-4">
          Redirecting to homepage in <span id="count">5</span> seconds...
        </p>
      </div>
    </div>

    <script>
      let total = localStorage.getItem("lastOrderTotal") || "0.00";
      document.getElementById("success-total").innerText = total;

      // Countdown redirect
      let seconds = 5;
      let counter = document.getElementById("count");

      let interval = setInterval(() => {
        seconds--;
        counter.innerText = seconds;

        if (seconds <= 0) {
          clearInterval(interval);
          window.location.href = "index.html";
        }
      }, 1000);
    </script>
  </body>
</html>
