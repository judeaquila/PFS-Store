<tr id="product-{{ product.id }}">
  <td>{{ product.name }}</td>
  <td>{{ product.category.name }}</td>
  <td>${{ product.price }}</td>
  <td>{{ product.stock }}</td>
  <td>
    {% if product.is_active %}
    <span class="badge bg-success">Active</span>
    {% else %}
    <span class="badge bg-secondary">Inactive</span>
    {% endif %}
  </td>
  <td class="text-end action-icons">
    <i
      class="bi bi-pencil-square text-primary me-2 edit-product"
      data-id="{{ product.id }}"
    ></i>
    <i
      class="bi bi-trash text-danger delete-product"
      data-id="{{ product.id }}"
    ></i>
  </td>
</tr>
