{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Zee Afrika Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'accounts/css/admin.css' %}" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-0">
          <h4 class="text-center py-3 border-bottom">Zee Afrika</h4>

          <a href="{% url 'admin_dashboard' %}">Dashboard</a>
          <a href="{% url 'products' %}">Products</a>
          <a href="{% url 'orders' %}">Orders</a>
          <a href="{% url 'inventory' %}">Inventory</a>
          <a href="{% url 'customers' %}">Customers</a>
          <a href="{% url 'reports' %}">Reports</a>
          <a href="{% url 'settings' %}">Settings</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-0">
          <!-- Top Navbar -->
          <nav class="navbar px-4">
            <div>
              <strong>{% block page_title %}Dashboard{% endblock %}</strong>
            </div>
            <div>
              <span class="me-3">Admin</span>
              <a href="#" class="btn btn-sm btn-outline-danger">Logout</a>
            </div>
          </nav>

          <!-- Page Content -->
          <div class="content">{% block content %} {% endblock %}</div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
