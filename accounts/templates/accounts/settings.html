{% extends "accounts/base.html" %} {% load static %} {% block page_title %}
Settings {% endblock %} {% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h4 class="mb-0">Settings</h4>
    <small class="text-muted"
      >Manage your account and company preferences</small
    >
  </div>
</div>

<!-- Tabs -->
<ul class="nav nav-tabs mb-4">
  <li class="nav-item">
    <button
      class="nav-link active"
      data-bs-toggle="tab"
      data-bs-target="#companyTab"
    >
      🏢 Company
    </button>
  </li>
  <li class="nav-item">
    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#brandingTab">
      🎨 Branding
    </button>
  </li>
  <li class="nav-item">
    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#accountTab">
      🔐 Account
    </button>
  </li>
</ul>

<div class="tab-content">
  <!-- ================= COMPANY INFO ================= -->
  <div class="tab-pane fade show active" id="companyTab">
    <div class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <form>
          <div class="mb-3">
            <label class="form-label">Company Name</label>
            <input type="text" class="form-control" value="Zee Afrika" />
          </div>

          <div class="mb-3">
            <label class="form-label">Address</label>
            <textarea class="form-control" rows="2">Nairobi, Kenya</textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" value="+254 700 123 456" />
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              value="info@zeeafrika.com"
            />
          </div>

          <button class="btn btn-primary">Save Company Info</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ================= BRANDING ================= -->
  <div class="tab-pane fade" id="brandingTab">
    <div class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <form>
          <div class="mb-3">
            <label class="form-label">Logo</label>
            <input type="file" class="form-control" />
          </div>

          <div class="mb-3">
            <label class="form-label">Favicon</label>
            <input type="file" class="form-control" />
          </div>

          <div class="mb-3">
            <label class="form-label">Theme Color</label>
            <input
              type="color"
              class="form-control form-control-color"
              value="#198754"
            />
          </div>

          <button class="btn btn-primary">Save Branding</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ================= ACCOUNT SETTINGS ================= -->
  <div class="tab-pane fade" id="accountTab">
    <div class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <form>
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" value="admin" />
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              value="admin@zeeafrika.com"
            />
          </div>

          <hr />

          <div class="mb-3">
            <label class="form-label">Change Password</label>
            <input
              type="password"
              class="form-control"
              placeholder="New Password"
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input
              type="password"
              class="form-control"
              placeholder="Confirm New Password"
            />
          </div>

          <button class="btn btn-primary">Save Account Settings</button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
