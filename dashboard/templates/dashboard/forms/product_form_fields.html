<div class="mb-3">
  <label for="id_name" class="form-label">Product Name</label>
  <input type="text" name="name" class="form-control" id="id_name" required>
</div>

<div class="mb-3">
  <label for="id_category" class="form-label">Category</label>
  <select name="category" class="form-select" id="id_category" required>
    {% for category in categories %}
      <option value="{{ category.id }}">{{ category.name }}</option>
    {% endfor %}
  </select>
</div>

<div class="mb-3">
  <label for="id_price" class="form-label">Price (GHS)</label>
  <input type="number" step="0.01" name="price" class="form-control" id="id_price" required>
</div>

<div class="mb-3">
  <label for="id_stock" class="form-label">Stock</label>
  <input type="number" name="stock" class="form-control" id="id_stock" required>
</div>

<div class="mb-3">
  <label for="id_description" class="form-label">Description</label>
  <textarea name="description" class="form-control" id="id_description" rows="3"></textarea>
</div>

<div class="mb-3">
  <label for="id_image" class="form-label">Primary Image</label>
  <input type="file" name="image" class="form-control" id="id_image">
</div>
