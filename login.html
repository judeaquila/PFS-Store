<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Login - GreenBasket</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg px-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">GreenBasket</a>
      </div>
    </nav>

    <!-- HERO -->
    <section class="hero hero-small text-center">
      <div class="container">
        <h1>Welcome Back</h1>
        <p>Login or create an account to continue shopping.</p>
      </div>
    </section>

    <div class="container my-5">
      <div class="row">
        <div class="col-md-6">
          <h4>Login</h4>
          <form>
            <div class="mb-3">
              <input type="email" class="form-control" placeholder="Email" />
            </div>
            <div class="mb-3">
              <input
                type="password"
                class="form-control"
                placeholder="Password"
              />
            </div>
            <button class="btn btn-green">Login</button>
          </form>
        </div>

        <div class="col-md-6">
          <h4>Sign Up</h4>
          <form>
            <div class="mb-3">
              <input type="text" class="form-control" placeholder="Full Name" />
            </div>
            <div class="mb-3">
              <input type="email" class="form-control" placeholder="Email" />
            </div>
            <div class="mb-3">
              <input
                type="password"
                class="form-control"
                placeholder="Password"
              />
            </div>
            <button class="btn btn-green">Create Account</button>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
