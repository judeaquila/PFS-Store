<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zee Afrika | Coming Soon</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #f6fff8;
        overflow: hidden;
      }

      .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        text-align: center;
      }

      h1 {
        font-weight: 600;
        color: #2f9e44;
        margin-bottom: 10px;
      }

      p {
        color: #1b4332;
        margin-bottom: 40px;
      }

      .animation-wrapper {
        position: absolute;
        bottom: 80px;
        width: 100%;
        overflow: hidden;
      }

      /* Stick figure movement */
      .walk {
        animation: moveAcross 8s linear infinite;
      }

      @keyframes moveAcross {
        from {
          transform: translateX(-200px);
        }
        to {
          transform: translateX(120vw);
        }
      }

      /* Wheel rotation */
      .wheel {
        transform-origin: center;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* Grocery bounce */
      .grocery {
        animation: bounce 0.6s ease-in-out infinite alternate;
      }

      @keyframes bounce {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-5px);
        }
      }

      .road {
        height: 3px;
        background: #2f9e44;
        width: 100%;
        position: absolute;
        bottom: 70px;
      }
    </style>
  </head>

  <body>
    <div class="hero">
      <h1>We're Stocking Up Something Fresh 🛒</h1>
      <p>Zee Afrika is getting ready. Launching soon.</p>

      <div class="animation-wrapper">
        <div class="road"></div>

        <svg class="walk" width="200" height="120" viewBox="0 0 200 120">
          <!-- Stick figure -->
          <circle
            cx="30"
            cy="40"
            r="10"
            stroke="#1b4332"
            stroke-width="3"
            fill="none"
          />
          <line
            x1="30"
            y1="50"
            x2="30"
            y2="80"
            stroke="#1b4332"
            stroke-width="3"
          />
          <line
            x1="30"
            y1="60"
            x2="15"
            y2="70"
            stroke="#1b4332"
            stroke-width="3"
          />
          <line
            x1="30"
            y1="60"
            x2="45"
            y2="70"
            stroke="#1b4332"
            stroke-width="3"
          />
          <line
            x1="30"
            y1="80"
            x2="20"
            y2="100"
            stroke="#1b4332"
            stroke-width="3"
          />
          <line
            x1="30"
            y1="80"
            x2="40"
            y2="100"
            stroke="#1b4332"
            stroke-width="3"
          />

          <!-- Cart -->
          <rect
            x="60"
            y="60"
            width="60"
            height="30"
            stroke="#2f9e44"
            stroke-width="3"
            fill="none"
          />
          <line
            x1="45"
            y1="70"
            x2="60"
            y2="70"
            stroke="#2f9e44"
            stroke-width="3"
          />

          <!-- Wheels -->
          <circle
            class="wheel"
            cx="75"
            cy="95"
            r="8"
            stroke="#2f9e44"
            stroke-width="3"
            fill="none"
          />
          <circle
            class="wheel"
            cx="110"
            cy="95"
            r="8"
            stroke="#2f9e44"
            stroke-width="3"
            fill="none"
          />

          <!-- Groceries -->
          <circle class="grocery" cx="75" cy="60" r="6" fill="#52b788" />
          <circle class="grocery" cx="95" cy="55" r="6" fill="#74c69d" />
          <circle class="grocery" cx="110" cy="60" r="6" fill="#95d5b2" />
        </svg>
      </div>
    </div>
  </body>
</html>
